<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceCaptain — Registrieren</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:rgba(255,255,255,.08);
    --text:#e8e8f0;--text-dim:#6b6b80;--accent:#f4a622;--accent2:#22d3ee;
    --success:#22c55e;--danger:#ef4444;--body:'Barlow',sans-serif;--mono:'Share Tech Mono',monospace;
    --display:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:420px;overflow:hidden}
  .card-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);text-align:center}
  .logo-mark{font-family:var(--display);font-size:22px;font-weight:900;color:var(--accent);letter-spacing:3px}
  .logo-sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-top:3px}
  .card-title{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:16px}
  .card-desc{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}
  .card-body{padding:24px 28px}
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .form-label .opt{color:var(--text-dim);font-size:10px;letter-spacing:0;text-transform:none;opacity:.7}
  .form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-family:var(--body);font-size:15px;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{width:100%;padding:12px;border-radius:6px;font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s;margin-top:4px}
  .btn-primary{background:var(--accent);color:#000}
  .btn-primary:hover{opacity:.9}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:6px;font-size:14px;line-height:1.5;display:none}
  .msg-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--success)}
  .msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
  .login-link{text-align:center;margin-top:18px;font-size:13px;color:var(--text-dim)}
  .login-link a{color:var(--accent2);text-decoration:none}
  .login-link a:hover{text-decoration:underline}
  /* AGB Checkbox */
  .agb-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;margin-top:4px;font-size:13px;line-height:1.5;color:var(--text-dim)}
  .agb-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer}
  .agb-link{color:var(--accent2);text-decoration:none;cursor:pointer}
  .agb-link:hover{text-decoration:underline}
  /* AGB Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .modal-title{font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;padding:4px}
  .modal-close:hover{color:var(--text)}
  .modal-body{padding:24px;overflow-y:auto;flex:1;font-size:14px;line-height:1.7;color:var(--text-dim)}
  .modal-body h1,.modal-body h2,.modal-body h3{font-family:var(--display);color:var(--text);margin:16px 0 8px;letter-spacing:.5px}
  .modal-body h1{font-size:20px}.modal-body h2{font-size:17px}.modal-body h3{font-size:15px}
  .modal-body p{margin-bottom:10px}
  .modal-body ul,.modal-body ol{margin:0 0 10px 20px}
  .modal-body li{margin-bottom:4px}
  .modal-body strong{color:var(--text)}
  .modal-body hr{border:none;border-top:1px solid var(--border);margin:16px 0}
  .modal-body a{color:var(--accent2)}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-mark">SPACECAPTAIN</div>
    <div class="logo-sub">NAVIGATING CREATIVITY</div>
    <div class="card-title">Registrieren</div>
    <div class="card-desc">Fülle das Formular aus. Ein Lab Manager schaltet deinen Zugang frei.</div>
  </div>
  <div class="card-body">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Vorname</label>
        <input class="form-input" id="r-firstname" type="text" placeholder="Max" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label class="form-label">Nachname</label>
        <input class="form-input" id="r-lastname" type="text" placeholder="Muster" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
        Benutzername
        <span id="un-status" style="font-size:11px;font-weight:400;letter-spacing:0;text-transform:none"></span>
      </label>
      <input class="form-input" id="r-username" type="text" placeholder="max.muster" autocomplete="username" spellcheck="false" oninput="onUsernameInput()">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" id="r-password" type="password" placeholder="Mindestens 6 Zeichen" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">E-Mail <span class="opt">(optional)</span></label>
      <input class="form-input" id="r-email" type="email" placeholder="max@beispiel.ch" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Telefon <span class="opt">(optional)</span></label>
      <input class="form-input" id="r-phone" type="tel" placeholder="+41 79 123 45 67" autocomplete="tel">
    </div>
    <div class="agb-row" id="agb-row" style="display:none">
      <input type="checkbox" id="r-agb">
      <label for="r-agb">Ich habe die <a class="agb-link" onclick="openAgbModal()">Allgemeinen Geschäftsbedingungen</a> gelesen und akzeptiere sie.</label>
    </div>
    <button class="btn btn-primary" id="r-submit" onclick="doRegister()">Registrierung absenden</button>
    <div class="msg msg-success" id="r-success">
      ✓ Deine Registrierung wurde übermittelt. Ein Lab Manager wird deinen Zugang in Kürze freischalten.
    </div>
    <div class="msg msg-error" id="r-error"></div>
    <div class="login-link">Bereits registriert? <a href="/">Zum Login</a></div>
  </div>
</div>

<!-- AGB Modal -->
<div class="modal-overlay" id="agb-modal" style="display:none" onclick="closeAgbModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Allgemeine Geschäftsbedingungen</div>
      <button class="modal-close" onclick="closeAgbModal()">✕</button>
    </div>
    <div class="modal-body" id="agb-content"></div>
  </div>
</div>

<script>
const API = '/api';
let _unCheckTimer = null;
let _unAvailable = null;
let _agbText = '';

function toUsername(str) {
  return str.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9.]/g,'');
}

function updateUsername() {
  const fn = document.getElementById('r-firstname').value.trim();
  const ln = document.getElementById('r-lastname').value.trim();
  const unField = document.getElementById('r-username');
  if (fn || ln) {
    unField.value = toUsername(fn) + (fn && ln ? '.' : '') + toUsername(ln);
    checkUsername();
  }
}

function onUsernameInput() {
  _unAvailable = null;
  setUnStatus('', '');
  clearTimeout(_unCheckTimer);
  _unCheckTimer = setTimeout(checkUsername, 400);
}

async function checkUsername() {
  const un = document.getElementById('r-username').value.trim();
  if (!un) { setUnStatus('', ''); return; }
  setUnStatus('Wird geprüft…', 'var(--text-dim)');
  try {
    const res = await fetch(`${API}/guests/check-username?u=${encodeURIComponent(un)}`);
    const data = await res.json();
    _unAvailable = data.available;
    if (data.available) {
      setUnStatus('✓ Verfügbar', 'var(--success)');
    } else {
      setUnStatus('✗ Bereits vergeben', 'var(--danger)');
    }
  } catch { setUnStatus('', ''); }
}

function setUnStatus(text, color) {
  const el = document.getElementById('un-status');
  el.textContent = text;
  el.style.color = color;
}

async function loadAgb() {
  try {
    const s = await fetch(`${API}/settings/public`).then(r => r.json());
    _agbText = s.agb_text || '';
    if (_agbText.trim()) {
      document.getElementById('agb-row').style.display = 'flex';
    }
  } catch { /* AGB nicht verfügbar — kein Pflichtfeld */ }
}

function openAgbModal() {
  document.getElementById('agb-content').innerHTML = marked.parse(_agbText);
  document.getElementById('agb-modal').style.display = 'flex';
}

function closeAgbModal(e) {
  if (!e || e.target === document.getElementById('agb-modal')) {
    document.getElementById('agb-modal').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('r-firstname').addEventListener('blur', updateUsername);
  document.getElementById('r-lastname').addEventListener('blur', updateUsername);
  loadAgb();
});

async function doRegister() {
  const fn = document.getElementById('r-firstname').value.trim();
  const ln = document.getElementById('r-lastname').value.trim();
  const un = document.getElementById('r-username').value.trim();
  const pw = document.getElementById('r-password').value;
  const em = document.getElementById('r-email').value.trim();
  const ph = document.getElementById('r-phone').value.trim();

  document.getElementById('r-error').style.display = 'none';

  if (!fn || !ln) return showErr('Bitte Vor- und Nachname angeben.');
  if (!un) return showErr('Bitte einen Benutzernamen wählen.');
  if (_unAvailable === false) return showErr('Benutzername bereits vergeben. Bitte einen anderen wählen.');
  if (pw.length < 6) return showErr('Passwort muss mindestens 6 Zeichen lang sein.');
  if (_agbText.trim() && !document.getElementById('r-agb').checked) {
    return showErr('Bitte akzeptiere die Allgemeinen Geschäftsbedingungen.');
  }

  const btn = document.getElementById('r-submit');
  btn.disabled = true;
  btn.textContent = 'Wird gesendet…';

  try {
    const res = await fetch(`${API}/guests/register`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: `${fn} ${ln}`, username: un, password: pw, email: em || null, phone: ph || null})
    });
    const data = await res.json();
    if (!res.ok) {
      showErr(data.detail || 'Fehler bei der Registrierung.');
      btn.disabled = false;
      btn.textContent = 'Registrierung absenden';
    } else {
      document.getElementById('r-success').style.display = 'block';
      btn.style.display = 'none';
    }
  } catch(e) {
    showErr('Verbindungsfehler. Bitte versuche es erneut.');
    btn.disabled = false;
    btn.textContent = 'Registrierung absenden';
  }
}

function showErr(msg) {
  const el = document.getElementById('r-error');
  el.textContent = msg;
  el.style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
