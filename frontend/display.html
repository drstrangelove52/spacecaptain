<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceCaptain — Display</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12;--surface:#151820;--surface2:#1c2030;--border:#2a2f3e;
    --accent:#f4a622;--accent2:#22d3ee;--danger:#ef4444;--success:#22c55e;
    --text:#e2e8f0;--text-dim:#a8bece;--text-mid:#c8d8e5;
    --mono:'Share Tech Mono',monospace;--body:'Barlow',sans-serif;--display:'Barlow Condensed',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column}

  header{background:var(--surface);border-bottom:2px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:20px;flex-shrink:0}
  .logo{height:44px}
  .header-title{font-family:var(--display);font-size:28px;font-weight:900;color:var(--accent);letter-spacing:3px}
  .header-sub{font-family:var(--mono);font-size:12px;color:var(--text-dim);letter-spacing:2px}
  .header-time{margin-left:auto;font-family:var(--mono);font-size:48px;color:var(--accent2);letter-spacing:2px}

  main{flex:1;padding:24px 32px;display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));align-content:start}

  .machine-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .machine-card.in-use{border-color:rgba(34,211,238,.4)}
  .machine-card.available{border-color:rgba(34,197,94,.3)}
  .machine-card.offline{opacity:.5}
  .card-top{padding:20px 20px 12px;display:flex;gap:14px;align-items:flex-start}
  .card-icon{font-size:36px;flex-shrink:0;margin-top:2px}
  .card-info{flex:1}
  .card-name{font-family:var(--display);font-size:24px;font-weight:900;letter-spacing:1px;line-height:1.1}
  .card-cat{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-top:3px}
  .card-status{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot-on{background:var(--accent2);animation:pulse 2s infinite}
  .dot-off{background:var(--success)}
  .dot-grey{background:var(--text-dim)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .status-text{font-family:var(--mono);font-size:13px}
  .status-user{font-weight:700;color:var(--accent2)}
  .status-avail{color:var(--success)}
  .status-offline{color:var(--text-dim)}
  .card-watt{margin-left:auto;font-family:var(--mono);font-size:16px;color:var(--accent);font-weight:700}
  .card-dur{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:2px}

  .queue-section{padding:10px 20px 14px;border-top:1px solid var(--border)}
  .queue-title{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px}
  .queue-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .queue-item:last-child{border-bottom:none}
  .queue-pos{font-family:var(--mono);font-size:11px;color:var(--accent);width:18px;flex-shrink:0}
  .queue-name{font-family:var(--mono);font-size:13px;color:var(--text)}
  .queue-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(34,211,238,.15);color:var(--accent2);border:1px solid rgba(34,211,238,.3);letter-spacing:1px;margin-left:auto}

  footer{padding:12px 32px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
  .refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}

  /* TICKER */
  .ticker-bar{width:100%;background:var(--accent);color:#000;font-family:var(--mono);font-weight:700;letter-spacing:1px;overflow:hidden;white-space:nowrap;flex-shrink:0;padding:10px 0}
  .ticker-track{display:inline-block;will-change:transform}

  /* ANKÜNDIGUNG */
  .announcement-card{background:linear-gradient(135deg,rgba(244,166,34,.12),rgba(244,166,34,.06));border:1px solid rgba(244,166,34,.5);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;grid-column:1/-1}
  .announcement-inner{padding:20px 24px;display:flex;gap:16px;align-items:flex-start}
  .announcement-icon{font-size:32px;flex-shrink:0}
  .announcement-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:3px;margin-bottom:6px}
  .announcement-text{font-size:16px;line-height:1.6;color:var(--text);white-space:pre-wrap}
</style>
</head>
<body>

<header>
  <img src="/SpaceCaptain.svg" class="logo" alt="SpaceCaptain">
  <div>
    <div class="header-title">SPACECAPTAIN</div>
    <div class="header-sub">NAVIGATING CREATIVITY</div>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:28px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:#fff;padding:4px;border-radius:4px;line-height:0">
        <img id="reg-qr" src="" alt="Registrierung" style="width:64px;height:64px;display:block;image-rendering:pixelated">
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:2px">REGISTRIEREN</div>
    </div>
    <div class="header-time" id="clock"></div>
  </div>
</header>

<main id="machine-grid">
  <div style="color:var(--text-dim);font-family:var(--mono);font-size:13px;grid-column:1/-1;padding:40px;text-align:center">Laden…</div>
</main>

<div id="ticker-bar" class="ticker-bar" style="display:none">
  <span class="ticker-track" id="ticker-track"></span>
</div>

<footer>
  <div class="refresh-dot"></div>
  <span>Automatische Aktualisierung alle 30 Sekunden</span>
  <span id="page-indicator" style="margin:0 auto;font-size:14px;letter-spacing:4px"></span>
  <span id="last-update"></span>
</footer>

<script>
const API = '/api';
const machineIcons = {Laser:'⚡',CNC:'⚙','3D-Druck':'🖨',Holz:'🪚',Metall:'🔩',Elektronik:'🔌',Textil:'🧵',Sonstiges:'🔧'};

function formatDur(min) {
  if (min == null) return '';
  if (min < 60) return `${Math.floor(min)} min`;
  const h = Math.floor(min/60), m = Math.floor(min%60);
  return m > 0 ? `${h}h ${m}min` : `${h}h`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('de-CH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

let _displayRefreshMs = 30000;

// ── Paginierung ────────────────────────────────────────
let _allMachines = [];
let _allQueues   = {};
let _currentPage = 0;
let PAGE_SIZE     = 8;
const PAGE_INTERVAL = 10000;
let _pageTimer = null;

// ── JS-Ticker (läuft unabhängig von loadData) ─────────
let _tickerRAF = null;
let _tickerPos = 0;
let _tickerSpeed = 80;
let _tickerHalfWidth = 0;
let _tickerLastTime = null;
let _tickerLastSource = '';

function _tickerStep(timestamp) {
  if (_tickerLastTime === null) _tickerLastTime = timestamp;
  const delta = Math.min(timestamp - _tickerLastTime, 100); // max 100ms Sprung
  _tickerLastTime = timestamp;
  _tickerPos += _tickerSpeed * delta / 1000;
  if (_tickerHalfWidth > 0 && _tickerPos >= _tickerHalfWidth) {
    _tickerPos -= _tickerHalfWidth;
  }
  const track = document.getElementById('ticker-track');
  if (track) track.style.transform = `translateX(-${_tickerPos}px)`;
  _tickerRAF = requestAnimationFrame(_tickerStep);
}

function renderTicker(text, speed, fontSize) {
  const bar = document.getElementById('ticker-bar');
  const track = document.getElementById('ticker-track');

  _tickerSpeed = speed || 80;

  if (!text || !text.trim()) {
    bar.style.display = 'none';
    if (_tickerRAF) { cancelAnimationFrame(_tickerRAF); _tickerRAF = null; }
    _tickerPos = 0;
    _tickerLastSource = '';
    return;
  }

  bar.style.fontSize = (fontSize || 18) + 'px';

  // Läuft bereits mit gleichem Quelltext → nur Speed/Grösse übernehmen
  if (text === _tickerLastSource && _tickerRAF) return;
  _tickerLastSource = text;

  if (_tickerRAF) { cancelAnimationFrame(_tickerRAF); _tickerRAF = null; }
  _tickerPos = 0;
  _tickerLastTime = null;

  const msgs = text.split('\n').map(l => l.trim()).filter(Boolean);
  const sep = '     +++     ';
  const half = msgs.join(sep) + sep;

  // Erst mal nur half setzen um Breite zu messen
  track.style.paddingLeft = '0';
  track.style.transform = '';
  track.textContent = half;
  bar.style.display = 'block';

  requestAnimationFrame(() => {
    const barW = bar.offsetWidth;
    const singleW = track.scrollWidth;

    // half so oft wiederholen bis es mindestens 1.5× Bildschirmbreite bedeckt
    // → Schleifenpunkt liegt immer ausserhalb des sichtbaren Bereichs
    let finalHalf = half;
    if (singleW > 0 && singleW < barW * 1.5) {
      const repeats = Math.ceil((barW * 1.5) / singleW);
      finalHalf = Array(repeats).fill(half).join('');
    }

    track.style.paddingLeft = barW + 'px';
    track.textContent = finalHalf + finalHalf;

    requestAnimationFrame(() => {
      _tickerHalfWidth = (track.scrollWidth - barW) / 2;
      _tickerLastTime = null;
      _tickerRAF = requestAnimationFrame(_tickerStep);
    });
  });
}

async function loadAnnouncements() {
  try {
    const items = await fetch('/api/announcements/active').then(r => r.json());
    window._announcements = (items || []).filter(a => a.display_type === 'banner').map(a => a.text);
    window._tickerExtra = (items || []).filter(a => a.display_type === 'ticker').map(a => a.text).join('\n');
    _rebuildTicker();
  } catch {}
}

function _rebuildTicker() {
  const parts = [window._tickerBase || '', window._tickerExtra || ''].filter(Boolean);
  renderTicker(parts.join('\n'), window._tickerSpeed || 80, window._tickerFontSize || 18);
}

function buildMachineCard(m) {
  const icon = machineIcons[m.category] || '🔧';
  const inUse = m.in_use || (m.plug_supported && m.plug_on === true);
  const adapterError = m.plug_supported && m.plug_error === 'unreachable';
  const available = m.status === 'online' && !inUse && !adapterError;
  const offline = m.status !== 'online';
  const cardClass = offline ? 'offline' : (inUse && !adapterError) ? 'in-use' : available ? 'available' : 'offline';

  let statusHtml;
  if (offline) {
    statusHtml = `<div class="card-status"><div class="dot dot-grey"></div><div class="status-text status-offline">${m.status === 'maintenance' ? 'IN WARTUNG' : 'OFFLINE'}</div></div>`;
  } else if (adapterError) {
    statusHtml = `<div class="card-status"><div class="dot dot-grey"></div><div class="status-text status-offline">ADAPTER OFFLINE</div></div>`;
  } else if (inUse) {
    const dur = m.session_duration_min != null ? formatDur(m.session_duration_min) : '';
    const watt = m.power_w != null ? `${Math.round(m.power_w)} W` : '';
    statusHtml = `<div class="card-status"><div class="dot dot-on"></div><div><div class="status-text status-user">◉ ${m.current_guest_name || 'In Benutzung'}</div>${dur ? `<div class="card-dur">${dur}</div>` : ''}</div>${watt ? `<div class="card-watt">${watt}</div>` : ''}</div>`;
  } else {
    statusHtml = `<div class="card-status"><div class="dot dot-off"></div><div class="status-text status-avail">● VERFÜGBAR</div></div>`;
  }

  const q = _allQueues[m.id] || [];
  let queueHtml = '';
  if (q.length > 0) {
    const items = q.map((entry, i) => `
      <div class="queue-item">
        <div class="queue-pos">${i+1}.</div>
        <div class="queue-name">${entry.guest_display}</div>
        ${entry.status === 'notified' ? '<div class="queue-badge">BEREIT</div>' : ''}
      </div>`).join('');
    queueHtml = `<div class="queue-section"><div class="queue-title">WARTELISTE // ${q.length} WARTEND</div>${items}</div>`;
  }

  return `<div class="machine-card ${cardClass}">
    <div class="card-top">
      <div class="card-icon">${icon}</div>
      <div class="card-info">
        <div class="card-name">${m.name}</div>
        <div class="card-cat">${m.category}${m.location && m.location !== '—' ? ' // ' + m.location : ''}</div>
      </div>
    </div>
    ${statusHtml}
    ${queueHtml}
  </div>`;
}

function renderPage(page) {
  const totalPages = Math.max(1, Math.ceil(_allMachines.length / PAGE_SIZE));
  if (page >= totalPages) page = 0;
  _currentPage = page;

  const grid = document.getElementById('machine-grid');
  let html = '';

  // Ankündigungen auf allen Seiten
  (window._announcements || []).forEach(text => {
    html += `<div class="announcement-card"><div class="announcement-inner"><div class="announcement-icon">📢</div><div style="flex:1"><div class="announcement-text" style="font-size:${window._announcementFontSize||20}px">${text.replace(/</g,'&lt;')}</div></div></div></div>`;
  });

  if (!_allMachines.length) {
    html += '<div style="color:var(--text-dim);font-family:var(--mono);font-size:13px;grid-column:1/-1;padding:40px;text-align:center">Keine Maschinen konfiguriert.</div>';
    grid.innerHTML = html;
    return;
  }

  const pageMachines = _allMachines.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  html += pageMachines.map(buildMachineCard).join('');
  grid.innerHTML = html;

  // Seitenindikator im Footer
  const dots = Array.from({length: totalPages}, (_, i) =>
    `<span style="color:${i === page ? 'var(--accent)' : 'var(--border)'}">●</span>`
  ).join(' ');
  document.getElementById('page-indicator').innerHTML = totalPages > 1 ? dots : '';
}

function startPageTimer() {
  if (_pageTimer) clearInterval(_pageTimer);
  const totalPages = Math.ceil(_allMachines.length / PAGE_SIZE);
  if (totalPages <= 1) return;
  _pageTimer = setInterval(() => renderPage(_currentPage + 1), PAGE_INTERVAL);
}

async function loadData() {
  const [machines, queues] = await Promise.all([
    fetch(`${API}/guest/dashboard`).then(r=>r.json()).catch(()=>[]),
    fetch(`${API}/queue`).then(r=>r.json()).catch(()=>[]),
  ]);

  _allMachines = machines;
  _allQueues = {};
  for (const q of queues) {
    if (!_allQueues[q.machine_id]) _allQueues[q.machine_id] = [];
    _allQueues[q.machine_id].push(q);
  }

  renderPage(_currentPage);
  startPageTimer();

  document.getElementById('last-update').textContent =
    'Zuletzt: ' + new Date().toLocaleTimeString('de-CH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

async function initDisplay() {
  // Registrierungs-QR laden
  const regUrl = `${window.location.origin}/register`;
  document.getElementById('reg-qr').src = `/api/qr/url-png?u=${encodeURIComponent(regUrl)}`;

  try {
    const s = await fetch('/api/settings/public').then(r => r.json());
    if (s.display_refresh_seconds) _displayRefreshMs = s.display_refresh_seconds * 1000;
    if (s.display_page_size) PAGE_SIZE = s.display_page_size;
    window._tickerBase = s.ticker_text || '';
    window._tickerSpeed = s.ticker_speed || 80;
    window._tickerFontSize = s.ticker_font_size || 18;
    window._announcementFontSize = s.announcement_font_size || 20;
  } catch {}
  await loadAnnouncements();
  loadData();
  setInterval(loadData, _displayRefreshMs);
  // Settings alle 5 Min, Ankündigungen jede Minute neu laden
  setInterval(async () => {
    try {
      const s = await fetch('/api/settings/public').then(r => r.json());
      window._tickerBase = s.ticker_text || '';
      window._tickerSpeed = s.ticker_speed || 80;
      window._tickerFontSize = s.ticker_font_size || 18;
      window._announcementFontSize = s.announcement_font_size || 20;
      _rebuildTicker();
    } catch {}
  }, 300000);
  setInterval(loadAnnouncements, 60000);
  document.querySelector('footer span:first-of-type').textContent =
    `Automatische Aktualisierung alle ${_displayRefreshMs/1000} Sekunden`;
}
initDisplay();
</script>
</body>
</html>
