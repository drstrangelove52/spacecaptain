server {
    listen 80;
    root /usr/share/nginx/html;

    # Gäste-Seite
    location = / {
        try_files /index.html =404;
    }

    # Lab Manager Dashboard
    location = /labmanager {
        try_files /labmanager.html =404;
    }

    # TV-Display (öffentlich)
    location = /display {
        try_files /display.html =404;
    }

    # Service Worker (muss vom Root aus erreichbar sein)
    location = /sw.js {
        try_files /sw.js =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Statische Assets
    location / {
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
