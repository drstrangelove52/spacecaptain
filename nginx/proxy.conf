# Rate-Limiting Zone: max. 5 Login-Versuche/Minute pro IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Docker-DNS mit kurzer TTL statt einmaliger Aufloesung beim Start/Reload.
    # Ohne das behaelt nginx nach "docker compose up --build backend" (neue
    # Container-IP) die alte IP fuer die Laufzeit des Prozesses und antwortet
    # mit 502 "Connection refused" auf alles inkl. Login, bis nginx selbst
    # neu gestartet wird. Variable statt Literal in proxy_pass zwingt nginx,
    # ueber den resolver pro Request (mit valid=10s gecacht) neu aufzuloesen.
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:80;
    set $mcp_upstream      http://mcp_server:8080;

    # Security headers
    add_header X-Frame-Options              "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;

    # Kurzlinks
    location = /display {
        return 301 /display.html;
    }
    location = /register {
        proxy_pass $frontend_upstream/register.html;
        proxy_set_header Host $host;
    }
    location = /nfc-setup {
        proxy_pass $frontend_upstream/nfc-setup.html;
        proxy_set_header Host $host;
    }
    location = /display/setup {
        proxy_pass $frontend_upstream/raspi-setup.html;
        proxy_set_header Host $host;
    }
    location = /raspi-setup.sh {
        proxy_pass $frontend_upstream/raspi-setup.sh;
        proxy_set_header Host $host;
        add_header Content-Type text/plain;
        add_header Content-Disposition inline;
    }

    # Frontend
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
    }

    # Login-Endpoints: Rate-Limiting (inkl. Token-Login)
    location ~ ^/api/(auth/login|guest/login|guest/login-by-token) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP-Server (HTTP-Transport, stateless)
    location /mcp/ {
        proxy_pass $mcp_upstream/mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # MCP Bootstrap-Token: nur intern (Docker-Netz), nie von aussen erreichbar
    location = /api/mcp/bootstrap-token {
        return 403;
    }

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Für QR-PNG Downloads
        proxy_buffering off;
        client_max_body_size 10m;
    }

    # FastAPI Docs
    location /docs {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
}
