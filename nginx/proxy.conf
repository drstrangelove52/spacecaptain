# Rate-Limiting Zone: max. 5 Login-Versuche/Minute pro IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options              "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;

    # Kurzlinks
    location = /display {
        return 301 /display.html;
    }
    location = /register {
        proxy_pass http://frontend:80/register.html;
        proxy_set_header Host $host;
    }
    location = /nfc-setup {
        proxy_pass http://frontend:80/nfc-setup.html;
        proxy_set_header Host $host;
    }
    location = /display/setup {
        proxy_pass http://frontend:80/raspi-setup.html;
        proxy_set_header Host $host;
    }
    location = /raspi-setup.sh {
        proxy_pass http://frontend:80/raspi-setup.sh;
        proxy_set_header Host $host;
        add_header Content-Type text/plain;
        add_header Content-Disposition inline;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Login-Endpoints: Rate-Limiting
    location ~ ^/api/(auth/login|guest/login) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Für QR-PNG Downloads
        proxy_buffering off;
        client_max_body_size 10m;
    }

    # FastAPI Docs — nur von Loopback erreichbar (intern via docker exec)
    location /docs {
        allow 127.0.0.1;
        deny all;
    }
    location /openapi.json {
        allow 127.0.0.1;
        deny all;
    }
}
