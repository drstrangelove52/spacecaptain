# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;

    # Kurzlinks
    location = /display {
        return 301 /display.html;
    }
    location = /register {
        proxy_pass http://frontend:80/register.html;
        proxy_set_header Host $host;
    }
    location = /display/setup {
        proxy_pass http://frontend:80/raspi-setup.html;
        proxy_set_header Host $host;
    }
    location = /raspi-setup.sh {
        proxy_pass http://frontend:80/raspi-setup.sh;
        proxy_set_header Host $host;
        add_header Content-Type text/plain;
        add_header Content-Disposition inline;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Für QR-PNG Downloads
        proxy_buffering off;
        client_max_body_size 10m;
    }

    # FastAPI Docs (optional, nur intern verfügbar machen)
    location /docs {
        proxy_pass http://backend:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}
