name: spacecaptain

services:
  db:
    image: mariadb:11
    container_name: spacecaptain_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-spacecaptain}
      MYSQL_USER: ${DB_USER:-spacecaptain}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - spacecaptain_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spacecaptain_backend
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE:-Europe/Zurich}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-spacecaptain}
      DB_USER: ${DB_USER:-spacecaptain}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme_use_long_random_string_in_production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      NFC_WRITER_URL: ${NFC_WRITER_URL:-}
      BUILD_NR: ${BUILD_NR:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spacecaptain_net
    volumes:
      - ./backend:/app
      - ${BACKUP_DIR:-./backups}:/app/backups
      - ./update_trigger:/app/update_trigger
      - ./tailscale-state:/app/tailscale-state:ro

  frontend:
    image: nginx:alpine
    container_name: spacecaptain_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - spacecaptain_net

  nginx:
    image: nginx:alpine
    container_name: spacecaptain_proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - spacecaptain_net

  tailscale:
    image: tailscale/tailscale:latest
    container_name: spacecaptain_tailscale
    hostname: ${TS_HOSTNAME:-spacecaptain}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    restart: unless-stopped
    profiles:
      - tailscale

volumes:
  db_data:

networks:
  spacecaptain_net:
    driver: bridge
